<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Sneakers | Limited Drops</title>
    <meta
      name="description"
      content="Shop exclusive sneaker drops and rare colorways. Authenticated pairs, cinematic 3D product experience, and limited releases with new drops every week."
    />

    <!-- Open Graph (Facebook, Slack, Discord, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Sneakers | Limited Drops" />
    <meta property="og:description" content="Shop exclusive sneaker drops and rare colorways. Authenticated pairs, cinematic 3D product experience, and limited releases with new drops every week." />
    <!--
      TODO: Replace the og:image below with a hosted 1200×630 image of your own
      (e.g. a hero shot of the shoe or a branded card) before going live.
      The Unsplash URL below is a functional placeholder — social crawlers
      will render it, but Unsplash may rate-limit hot-linking in production.
    -->
    <meta property="og:image"       content="https://images.unsplash.com/photo-1584735175315-9d5df23860e6?w=1200&q=80" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Sneakers | Limited Drops" />
    <meta name="twitter:description" content="Shop exclusive sneaker drops and rare colorways. Authenticated pairs, cinematic 3D product experience, and limited releases with new drops every week." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1584735175315-9d5df23860e6?w=1200&q=80" />

    <!-- Favicon (SVG — supported in all modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
